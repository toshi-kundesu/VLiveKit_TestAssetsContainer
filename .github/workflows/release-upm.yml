name: Release UPM Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.0.1"
        required: true
        type: string

permissions:
  contents: write

env:
  PACKAGE_ROOT: Assets/toshi.VLiveKit/TestAssetsContainer
  PACKAGE_WORKDIR: /tmp/upm-package

jobs:
  release:
    name: Publish scoped registry package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js for npm registry
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Tag must look like v0.0.1 or v0.0.1-preview.1: $tag"
            exit 1
          fi

          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Prepare package contents
        shell: bash
        run: |
          test -f "$PACKAGE_ROOT/package.json"

          rm -rf "$PACKAGE_WORKDIR"
          mkdir -p "$PACKAGE_WORKDIR"
          cp -a "$PACKAGE_ROOT"/. "$PACKAGE_WORKDIR"/

          package_name="$(node -e 'const fs = require("fs"); const path = process.env.PACKAGE_WORKDIR + "/package.json"; console.log(JSON.parse(fs.readFileSync(path, "utf8").replace(/^\uFEFF/, "")).name);')"

          write_meta() {
            local asset_path="$1"
            local guid
            guid="$(node -e 'const crypto = require("crypto"); console.log(crypto.createHash("md5").update(process.argv[1]).digest("hex"));' "$package_name:$asset_path")"
            {
              printf 'fileFormatVersion: 2\n'
              printf 'guid: %s\n' "$guid"
              printf 'DefaultImporter:\n'
              printf '  externalObjects: {}\n'
              printf '  userData:\n'
              printf '  assetBundleName:\n'
              printf '  assetBundleVariant:\n'
            } > "$PACKAGE_WORKDIR/$asset_path.meta"
          }

          if [[ -f README.md ]]; then
            cp README.md "$PACKAGE_WORKDIR/README.md"
            write_meta README.md
          fi

          if [[ -f LICENSE ]]; then
            cp LICENSE "$PACKAGE_WORKDIR/LICENSE"
            write_meta LICENSE
          fi

          if [[ -d "$PACKAGE_WORKDIR/Samples" ]]; then
            rm -rf "$PACKAGE_WORKDIR/Samples~"
            mv "$PACKAGE_WORKDIR/Samples" "$PACKAGE_WORKDIR/Samples~"
            if [[ -f "$PACKAGE_WORKDIR/Samples.meta" ]]; then
              mv "$PACKAGE_WORKDIR/Samples.meta" "$PACKAGE_WORKDIR/Samples~.meta"
            fi
          fi

          node -e '
            const fs = require("fs");
            const path = process.env.PACKAGE_WORKDIR + "/package.json";
            const packageJson = JSON.parse(fs.readFileSync(path, "utf8").replace(/^\uFEFF/, ""));
            packageJson.version = process.env.RELEASE_VERSION;
            fs.writeFileSync(path, JSON.stringify(packageJson, null, 2) + "\n");
          '
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}

      - name: Pack UPM tarball
        id: pack
        shell: bash
        working-directory: ${{ env.PACKAGE_WORKDIR }}
        run: |
          npm pack --json > /tmp/npm-pack.json
          tarball="$(node -e 'const fs = require("fs"); const pack = JSON.parse(fs.readFileSync("/tmp/npm-pack.json", "utf8")); console.log(pack[0].filename);')"
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"
          echo "tarball_path=$PACKAGE_WORKDIR/$tarball" >> "$GITHUB_OUTPUT"

      - name: Publish to npm registry
        shell: bash
        run: |
          if [[ -z "$NODE_AUTH_TOKEN" ]]; then
            echo "::error::Missing NPM_TOKEN repository secret. Create an npm automation token and save it as NPM_TOKEN."
            exit 1
          fi

          npm publish "${{ steps.pack.outputs.tarball_path }}" --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: ${{ steps.pack.outputs.tarball_path }}

