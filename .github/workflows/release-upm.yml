name: Release UPM Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.0.2"
        required: true
        type: string

permissions:
  contents: write

env:
  PACKAGE_ROOT: Assets/toshi.VLiveKit/TestAssetsContainer
  UPM_BRANCH: upm
  UPM_VERSION_BRANCH_PREFIX: upm-

jobs:
  release:
    name: Build UPM branch and GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js for npm registry
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Tag must look like v0.0.2 or v0.0.2-preview.1: $tag"
            exit 1
          fi

          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Validate package root
        shell: bash
        run: |
          test -f "$PACKAGE_ROOT/package.json"

      - name: Keep repository-level files
        shell: bash
        run: |
          mkdir -p /tmp/upm-release-files
          cp README.md /tmp/upm-release-files/README.md
          cp LICENSE /tmp/upm-release-files/LICENSE

      - name: Split package into UPM branch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git branch -D "$UPM_BRANCH" 2>/dev/null || true
          git subtree split --prefix="$PACKAGE_ROOT" -b "$UPM_BRANCH"
          git checkout "$UPM_BRANCH"

      - name: Prepare UPM branch contents
        shell: bash
        run: |
          node -e '
            const fs = require("fs");
            const version = process.env.RELEASE_VERSION;
            const packageJson = JSON.parse(fs.readFileSync("package.json", "utf8"));
            packageJson.version = version;
            fs.writeFileSync("package.json", JSON.stringify(packageJson, null, 2) + "\n");
          '

          cp /tmp/upm-release-files/README.md README.md
          cp /tmp/upm-release-files/LICENSE LICENSE
          cat > README.md.meta <<'EOF'
          fileFormatVersion: 2
          guid: 61f1b63d2b074d6ba8a0c026b03f36e0
          DefaultImporter:
            externalObjects: {}
            userData:
            assetBundleName:
            assetBundleVariant:
          EOF
          cat > LICENSE.meta <<'EOF'
          fileFormatVersion: 2
          guid: 9a7cdb7dd2434d3f8ca30a31a90cb0de
          DefaultImporter:
            externalObjects: {}
            userData:
            assetBundleName:
            assetBundleVariant:
          EOF

          if [[ -d Samples ]]; then
            rm -rf Samples~
            mv Samples Samples~
          fi

          git add .
          git commit -m "Release $RELEASE_TAG" || true
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}

      - name: Push UPM branch
        shell: bash
        run: |
          upm_version_branch="${UPM_VERSION_BRANCH_PREFIX}${RELEASE_TAG}"
          git push origin "$UPM_BRANCH" --force
          git push origin "HEAD:refs/heads/$upm_version_branch" --force
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}

      - name: Pack UPM tarball
        id: pack
        shell: bash
        run: |
          npm pack --json > /tmp/npm-pack.json
          tarball="$(node -e 'const fs = require("fs"); const pack = JSON.parse(fs.readFileSync("/tmp/npm-pack.json", "utf8")); console.log(pack[0].filename);')"
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"

      - name: Publish to npm registry
        shell: bash
        run: |
          if [[ -z "$NODE_AUTH_TOKEN" ]]; then
            echo "::error::Missing NPM_TOKEN repository secret. Create an npm automation token and save it as NPM_TOKEN."
            exit 1
          fi

          npm publish "${{ steps.pack.outputs.tarball }}" --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: ${{ steps.pack.outputs.tarball }}
